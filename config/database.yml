default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>


development:
  <<: *default
  database: rspec_development

test:
  <<: *default
  database: rspec_test

production:
  primary: &primary_production
    <<: *default
    database: rspec_production
    username: rspec
    password: <%= ENV["RSPEC_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: rspec_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: rspec_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: rspec_production_cable
    migrations_paths: db/cable_migrate
